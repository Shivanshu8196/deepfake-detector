<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <div class="card p-4">

        <h2>Detection Result</h2>

        {% if label == "REAL" %}
            <h3 class="text-success">REAL ✅</h3>
        {% else %}
            <h3 class="text-danger">FAKE ❌</h3>
        {% endif %}

        <p>Confidence: {{ confidence }}%</p>

        <a href="/dashboard" class="btn btn-primary mt-3">Try Another</a>

    </div>

</div>

</body>
</html>
